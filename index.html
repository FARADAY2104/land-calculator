<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณที่ดิน</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { color: #2c3e50; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 18px; }
        .res-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #27ae60; }
    </style>
</head>
<body>
    <div class="card">
        <h2>แปลงหน่วยที่ดิน</h2>
        <input type="number" id="r" placeholder="จำนวนไร่" oninput="cal()">
        <input type="number" id="n" placeholder="จำนวนงาน" oninput="cal()">
        <input type="number" id="w" placeholder="จำนวนวา" oninput="cal()">
        <div id="display" class="res-box">กรอกตัวเลขเพื่อคำนวณ</div>
    </div>
    <script>
        function cal() {
            let r = parseFloat(document.getElementById('r').value) || 0;
            let n = parseFloat(document.getElementById('n').value) || 0;
            let w = parseFloat(document.getElementById('w').value) || 0;
            let total = (r * 1600) + (n * 400) + (w * 4);
            document.getElementById('display').innerHTML = 
                `<b>ผลรวม: ${total.toLocaleString()} ตร.ม.</b><br>` +
                `<small>(${r} ไร่, ${n} งาน, ${w} วา)</small>`;
        }
    </script>
</body>
</html>
